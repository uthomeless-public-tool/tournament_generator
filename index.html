<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ロビー大会ルール抽選</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tabs">
        <button id="tab-slot"   class="tab-btn active" onclick="switchTab('slot')">ルール抽選</button>
        <button id="tab-tokkan" class="tab-btn"         onclick="switchTab('tokkan')">突貫バース</button>
        <button id="tab-config" class="tab-btn"         onclick="switchTab('config')">項目設定</button>
    </div>

    <div class="main-card">

        <!-- ─── ルール抽選 ─── -->
        <div id="slot-container">
            <p class="section-title">🎲 ルール抽選</p>
            <div class="hint-box">
                👆 <b>パネルをタップ</b>で手動切り替え　🔒 <b>鍵</b>で固定　⚖ <b>重み</b>で確率調整　✕ <b>削除</b>
            </div>

            <div id="app" class="slot-container"></div>

            <button id="main-btn" class="btn-main" onclick="startSpin()">抽選開始</button>

            <div class="btn-row">
                <button class="btn-sub" onclick="resetToDefault()">🔄 初期値に戻す</button>
            </div>

            <div id="result-wrapper-slot" class="result-area">
                <div class="result-label">抽選結果</div>
                <div id="result-text-slot" class="result-text"></div>
                <button class="btn-copy" onclick="copyToClipboard('result-text-slot', this)">📋 コピー</button>
            </div>

            <!-- プリセット -->
            <div class="preset-section">
                <div class="preset-header">
                    <span>📁 プリセット</span>
                </div>
                <div class="preset-save-row">
                    <input type="text" id="preset-name-input" placeholder="プリセット名を入力して保存">
                    <button class="btn-sub" onclick="savePreset()">保存</button>
                </div>
                <div id="preset-list" class="preset-list"></div>
            </div>

            <!-- 履歴 -->
            <div class="history-section">
                <div class="history-header">
                    <span>🕐 抽選履歴（最大5件）</span>
                    <button class="history-clear" onclick="clearHistory()">クリア</button>
                </div>
                <div id="history-list" class="history-list"></div>
            </div>
        </div>

        <!-- ─── 突貫バース ─── -->
        <div id="tokkan-container" style="display:none">
            <p class="section-title tokkan">🃏 突貫バース抽選</p>
            <div class="hint-box tokkan">
                🃏 <b>突貫バース</b>：抽選されたパックのみで戦う特殊ルール。各パックは重複なしで選出されます。
            </div>
            <div class="pack-count-row">
                <label>パック数</label>
                <input type="number" id="tokkan-pack-num" value="4" min="1" oninput="renderTokkanInitial()">
            </div>
            <div id="tokkan-app" class="slot-container"></div>
            <button id="tokkan-main-btn" class="btn-main tokkan-btn" onclick="startTokkanSpin()">パックを抽選</button>
            <div id="result-wrapper-tokkan" class="result-area tokkan-result">
                <div class="result-label">採用パック</div>
                <div id="tokkan-result-text" class="result-text"></div>
                <button class="btn-copy" onclick="copyToClipboard('tokkan-result-text', this)">📋 コピー</button>
            </div>
        </div>

        <!-- ─── 設定 ─── -->
        <div id="config-container" style="display:none">
            <p class="section-title">⚙️ 項目設定</p>
            <div id="config-editor"></div>
            <div class="add-row-box">
                <label>＋ 新規項目</label>
                <input type="text" id="new-row-name" placeholder="項目名">
                <button class="btn-add" onclick="addNewRow()">追加</button>
            </div>
            <div class="tokkan-editor-box">
                <label>🃏 突貫用パックリスト（読点または , 区切り）</label>
                <textarea id="tokkan-list-editor"></textarea>
            </div>
            <button class="btn-save" onclick="saveConfig()">保存して戻る</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
